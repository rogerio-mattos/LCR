id: com.linuxcustomresolution.LCR
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: lcr
finish-args:
  - --share=ipc
  - --socket=session-bus
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.freedesktop.portal.Settings

modules:
  - name: lcr
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps --no-build-isolation .
      - install -Dm644 data/com.linuxcustomresolution.LCR.desktop /app/share/applications/com.linuxcustomresolution.LCR.desktop
      - install -Dm644 data/com.linuxcustomresolution.LCR.metainfo.xml /app/share/metainfo/com.linuxcustomresolution.LCR.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/com.linuxcustomresolution.LCR.svg /app/share/icons/hicolor/scalable/apps/com.linuxcustomresolution.LCR.svg
      - install -Dm644 data/screenshots/main-window.png /app/share/metainfo/screenshots/com.linuxcustomresolution.LCR/main-window.png
      - install -Dm644 data/screenshots/supported-modes.png /app/share/metainfo/screenshots/com.linuxcustomresolution.LCR/supported-modes.png
      - |
        for po in po/*.po; do
          lang=$(basename "$po" .po)
          mkdir -p "/app/share/locale/$lang/LC_MESSAGES"
          msgfmt -o "/app/share/locale/$lang/LC_MESSAGES/lcr.mo" "$po"
        done
    sources:
      - type: dir
        path: ..
